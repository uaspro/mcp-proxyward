audit:
  sink: sqlite
  sqlitePath: /app/data/proxyward.db
inspection:
  batchToolCalls: failClosed
  maxBodyBytes: 1048576
  unsupportedStreaming: warn
mode: audit
observability:
  applicationInsights:
    connectionStringEnv: APPLICATIONINSIGHTS_CONNECTION_STRING
    enabled: false
  console:
    enabled: true
  otlp:
    enabled: true
    endpoint: http://otel-collector:4317
  sampling:
    tracesRatio: 1
  serviceName: mcp-proxyward
servers:
  github:
    allowed: false
    arguments:
      commands:
        blockShell: true
        dangerous: []
      hosts:
        allow: []
        blockPrivateNetworks: true
      overrides: {}
      paths:
        allowedRoots: []
        blockTraversal: true
    route: /server/github
    secrets:
      blockReturn: false
      patterns: []
      redactInLogs: false
    tools:
      allow:
      - test
      block: []
      default: allow
    upstream: https://api.githubcopilot.com/mcp/
