services:
  proxyward:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      PROXYWARD_POLICY_PATH: /app/config/proxyward.yaml
      PROXYWARD_CONTROL_ENABLED: "true"
      PROXYWARD_ADMIN_TOKEN: proxyward-local-admin-token
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./samples/compose/proxyward.yaml:/app/config/proxyward.yaml:ro
      - proxyward-data:/app/data
    depends_on:
      - sample-mcp
      - otel-collector

  management-api:
    build:
      context: .
      dockerfile: src/ProxyWard.Management.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8081
      PROXYWARD_MANAGEMENT_AUDIT_DB_PATH: /app/data/proxyward.db
      PROXYWARD_MANAGEMENT_POLICY_PATH: /app/config/proxyward.yaml
      PROXYWARD_PROXY_CONTROL_URL: http://proxyward:8080
      PROXYWARD_ADMIN_TOKEN: proxyward-local-admin-token
      PROXYWARD_MANAGEMENT_ADMIN_TOKEN: proxyward-local-admin-token
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./samples/compose/proxyward.yaml:/app/config/proxyward.yaml
      - proxyward-data:/app/data
    depends_on:
      - proxyward

  dashboard:
    build:
      context: ./src/ProxyWard.Dashboard
      dockerfile: Dockerfile
      args:
        VITE_PROXYWARD_API_BASE_URL: /
        VITE_PROXYWARD_ADMIN_TOKEN: proxyward-local-admin-token
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - management-api

  sample-mcp:
    build:
      context: .
      dockerfile: samples/SampleMcpServer/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.151.0
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./samples/compose/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"

volumes:
  proxyward-data:
